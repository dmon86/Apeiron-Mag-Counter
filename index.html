<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Mag Calibrator Pro - Apeiron</title>
    <style>
        /* Base Theme: Dark Grey & Red with Native App Scrolling Fixes */
        body { 
            font-family: system-ui, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: #e0e0e0; 
            padding: 20px; 
            overscroll-behavior-y: none; /* Stops iOS/Android rubber-band bounce */
            overflow-x: hidden;          /* Stops side-to-side wobble */
            touch-action: manipulation;  /* Stops double-tap zoom, ALLOWS vertical scroll */
        }
        
        .card { background: #1c1c1c; padding: 25px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 8px 25px rgba(0,0,0,0.8); border-top: 4px solid #cc0000; }
        
        /* Logo Styling */
        .app-logo { max-width: 85%; height: auto; margin: 0 auto 15px auto; display: block; mix-blend-mode: screen; }
        
        h2 { margin-top: 0; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2rem; color: #888; }
        
        button { background: #cc0000; color: white; border: none; padding: 10px 15px; margin: 5px 0; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #990000; }
        button:disabled { background: #333333; color: #666666; cursor: not-allowed; }
        
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; background: #262626; border: 1px solid #444; color: white; border-radius: 6px; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: #cc0000; outline: none; box-shadow: 0 0 8px rgba(204, 0, 0, 0.4); }
        
        .data-readout { display: flex; justify-content: space-around; font-size: 16px; margin: 20px 0; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #333; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        .highlight { display: block; font-size: 28px; font-weight: bold; margin-top: 5px; }
        .dist-color { color: #ff4444; } 
        .ammo-color { color: #ff3333; } 
        
        /* Odometer Panel Dual Layout */
        .odometer-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .odometer-panel { flex: 1; background: #111; border: 1px solid #444; border-radius: 8px; padding: 15px 10px; text-align: center; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: flex; flex-direction: column; justify-content: center; }
        .odo-value { display: block; color: #fff; font-size: 24px; font-weight: bold; margin-top: 5px; }
        
        .reset-btn { background: #222; border: 1px solid #cc0000; color: #ff3333; padding: 5px; margin-top: 10px; font-size: 11px; border-radius: 4px; }
        .reset-btn:hover { background: #cc0000; color: #fff; }

        .hud-preview-container { margin: 20px 0; text-align: left; }
        .hud-screen { background: #050000; border: 2px solid #441111; border-radius: 8px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.1rem; text-align: center; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s ease-in-out; }
        
        /* Calibration Table */
        .table-container { max-height: 300px; overflow-y: auto; background: #161616; border-radius: 8px; padding: 10px; border: 1px solid #333; margin-bottom: 20px; touch-action: pan-y; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 8px; border-bottom: 2px solid #cc0000; color: #cc0000; font-size: 13px; text-transform: uppercase; }
        td { padding: 8px; border-bottom: 1px solid #2a2a2a; }
        td input { margin: 0; padding: 6px; background: #222; border: 1px solid #444; width: 80px;}
        td input:focus { border-color: #cc0000; }
        
        .row-btn { padding: 6px 10px; font-size: 12px; background: #333; border: 1px solid #444; }
        .row-btn:hover { background: #cc0000; color: #fff; border-color: #cc0000; }
        
        /* Fixed Input Alignment */
        #status { margin-top: 15px; font-size: 14px; color: #888; font-weight: bold; text-transform: uppercase; }
        .input-group { text-align: left; margin-top: 10px; display: flex; flex-direction: column; justify-content: flex-end; }
        label { font-size: 13px; color: #aaaaaa; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; white-space: nowrap; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #161616; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #cc0000; }
    </style>
</head>
<body>
    <div class="card">
        <img src="apeiron_logo.png" alt="Apeiron Weapon Systems" class="app-logo">
        
        <h2>Smart Mag Calibrator</h2>
        
        <div class="odometer-container">
            <div class="odometer-panel">
                Lifetime Cycles
                <span class="odo-value" id="odoDisplay">---</span>
            </div>
            <div class="odometer-panel">
                Rounds Since Reset
                <span class="odo-value" id="tripDisplay" style="color: #ffcc00;">---</span>
                <button id="resetTripBtn" class="reset-btn" disabled>RESET COUNT</button>
            </div>
        </div>

        <button id="connectBtn" style="font-size: 16px; padding: 15px; background: #8b0000;">Connect to Magazine</button>
        
        <div class="data-readout">
            <div>Sensor <span class="highlight dist-color"><span id="distValue">--</span><span style="font-size:14px;"> mm</span></span></div>
            <div style="border-left: 1px solid #333; padding-left: 20px;">HUD Calc <span class="highlight ammo-color">
