<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Mag Calibrator Pro - Apeiron</title>
    <style>
        /* Base Theme: Dark Grey & Red with Native App Scrolling Fixes */
        body { 
            font-family: system-ui, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: #e0e0e0; 
            padding: 20px; 
            overscroll-behavior-y: none; /* Stops iOS/Android rubber-band bounce */
            overflow-x: hidden;          /* Stops side-to-side wobble */
            touch-action: manipulation;  /* Stops double-tap zoom, ALLOWS vertical scroll */
        }
        
        .card { background: #1c1c1c; padding: 25px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 8px 25px rgba(0,0,0,0.8); border-top: 4px solid #cc0000; }
        
        /* Logo Styling */
        .app-logo { max-width: 85%; height: auto; margin: 0 auto 15px auto; display: block; mix-blend-mode: screen; }
        
        h2 { margin-top: 0; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2rem; color: #888; }
        
        button { background: #cc0000; color: white; border: none; padding: 10px 15px; margin: 5px 0; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #990000; }
        button:disabled { background: #333333; color: #666666; cursor: not-allowed; }
        
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; background: #262626; border: 1px solid #444; color: white; border-radius: 6px; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: #cc0000; outline: none; box-shadow: 0 0 8px rgba(204, 0, 0, 0.4); }
        
        .data-readout { display: flex; justify-content: space-around; font-size: 16px; margin: 20px 0; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #333; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        .highlight { display: block; font-size: 28px; font-weight: bold; margin-top: 5px; }
        .dist-color { color: #ff4444; } 
        .ammo-color { color: #ff3333; } 
        
        /* Odometer Panel Dual Layout */
        .odometer-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .odometer-panel { flex: 1; background: #111; border: 1px solid #444; border-radius: 8px; padding: 15px 10px; text-align: center; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: flex; flex-direction: column; justify-content: center; }
        .odo-value { display: block; color: #fff; font-size: 24px; font-weight: bold; margin-top: 5px; }
        
        .reset-btn { background: #222; border: 1px solid #cc0000; color: #ff3333; padding: 5px; margin-top: 10px; font-size: 11px; border-radius: 4px; }
        .reset-btn:hover { background: #cc0000; color: #fff; }

        .hud-preview-container { margin: 20px 0; text-align: left; }
        .hud-screen { background: #050000; border: 2px solid #441111; border-radius: 8px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.1rem; text-align: center; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s ease-in-out; }
        
        /* Calibration Table */
        .table-container { max-height: 300px; overflow-y: auto; background: #161616; border-radius: 8px; padding: 10px; border: 1px solid #333; margin-bottom: 20px; touch-action: pan-y; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 8px; border-bottom: 2px solid #cc0000; color: #cc0000; font-size: 13px; text-transform: uppercase; }
        td { padding: 8px; border-bottom: 1px solid #2a2a2a; }
        td input { margin: 0; padding: 6px; background: #222; border: 1px solid #444; width: 80px;}
        td input:focus { border-color: #cc0000; }
        
        .row-btn { padding: 6px 10px; font-size: 12px; background: #333; border: 1px solid #444; }
        .row-btn:hover { background: #cc0000; color: #fff; border-color: #cc0000; }
        
        /* Fixed Input Alignment */
        #status { margin-top: 15px; font-size: 14px; color: #888; font-weight: bold; text-transform: uppercase; }
        .input-group { text-align: left; margin-top: 10px; display: flex; flex-direction: column; justify-content: flex-end; }
        label { font-size: 13px; color: #aaaaaa; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; white-space: nowrap; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #161616; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #cc0000; }
    </style>
</head>
<body>
    <div class="card">
        <img src="apeiron_logo.png" alt="Apeiron Weapon Systems" class="app-logo">
        
        <h2>Smart Mag Calibrator</h2>
        
        <div class="odometer-container">
            <div class="odometer-panel">
                Lifetime Cycles
                <span class="odo-value" id="odoDisplay">---</span>
            </div>
            <div class="odometer-panel">
                Rounds Since Reset
                <span class="odo-value" id="tripDisplay" style="color: #ffcc00;">---</span>
                <button id="resetTripBtn" class="reset-btn" disabled>RESET COUNT</button>
            </div>
        </div>

        <button id="connectBtn" style="font-size: 16px; padding: 15px; background: #8b0000;">Connect to Magazine</button>
        
        <div class="data-readout">
            <div>Sensor <span class="highlight dist-color"><span id="distValue">--</span><span style="font-size:14px;"> mm</span></span></div>
            <div style="border-left: 1px solid #333; padding-left: 20px;">HUD Calc <span class="highlight ammo-color"><span id="ammoValue">--</span><span style="font-size:14px;"> Rnd</span></span></div>
        </div>

        <div class="hud-preview-container">
            <label>HUD Display Preview:</label>
            <div class="hud-screen" id="hudPreviewText" style="color: #aa1111; opacity: 0.7; box-shadow: inset 0 0 5px rgba(255, 51, 51, 0.1);">WPN | M:-- | R:--</div>
        </div>

        <div style="display: flex; gap: 10px; align-items: flex-end; overflow: hidden;">
            <div class="input-group" style="flex: 2;">
                <label>Weapon (Max 8):</label>
                <input type="text" id="weaponName" value="AR-15" maxlength="8">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Mag #:</label>
                <input type="number" id="magNum" value="1" min="1" max="99">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Max Ammo:</label>
                <input type="number" id="maxAmmo" value="30" min="1" max="60">
            </div>
        </div>

        <hr>
        
        <div style="text-align: left; display: flex; justify-content: space-between; align-items: center;">
            <label style="color: #fff; margin-bottom: 0;">Per-Round Distance Map</label>
            <button id="autoFillBtn" style="width: auto; background: #222; border: 1px solid #cc0000; color: #ff3333; padding: 6px 12px; margin: 0;">Auto-Fill Linear</button>
        </div>
        
        <div class="table-container" style="margin-top: 10px;">
            <table>
                <thead><tr><th>Rnd</th><th>Dist (mm)</th><th>Live Capture</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <button id="saveBtn" style="font-size: 16px; padding: 15px;" disabled>Save Calibration to Mag</button>
        <p id="status">Ready to connect.</p>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const DISTANCE_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        const CONFIG_CHAR_UUID = "8c3b7a5e-2b72-4d2c-8060-e883e4757041";
        const ODOMETER_CHAR_UUID = "e00a30b5-7798-4c17-8178-574d75d315f6"; 

        let myDevice, distanceChar, configChar, odoChar;
        let currentDist = 0;
        let distArray = [];

        function buildTable() {
            const max = parseInt(document.getElementById('maxAmmo').value) || 30;
            let html = '';
            for(let i = 0; i <= max; i++) {
                let val = distArray[i] !== undefined ? distArray[i] : 0;
                html += `<tr>
                            <td style="font-weight:bold; color:#ff4444;">${i}</td>
                            <td><input type="number" id="dist_${i}" value="${val}" onchange="updateArray(${i})"></td>
                            <td><button class="row-btn" onclick="grabLive(${i})">Grab Live</button></td>
                         </tr>`;
            }
            document.getElementById('tableBody').innerHTML = html;
            distArray.length = max + 1; 
        }

        function updateArray(index) {
            distArray[index] = parseInt(document.getElementById(`dist_${index}`).value) || 0;
            calculateLiveAmmo();
        }

        function grabLive(index) {
            if(currentDist > 0) {
                document.getElementById(`dist_${index}`).value = currentDist;
                updateArray(index);
            }
        }

        document.getElementById('autoFillBtn').addEventListener('click', () => {
            const max = parseInt(document.getElementById('maxAmmo').value) || 30;
            const emptyDist = parseInt(document.getElementById('dist_0').value) || 0;
            const fullDist = parseInt(document.getElementById(`dist_${max}`).value) || 0;
            if (emptyDist === 0 || fullDist === 0) { alert("Please grab live data for Round 0 and Max Round first."); return; }
            for(let i = 1; i < max; i++) {
                let interpolated = emptyDist + ((fullDist - emptyDist) * (i / max));
                document.getElementById(`dist_${i}`).value = Math.round(interpolated);
                distArray[i] = Math.round(interpolated);
            }
            calculateLiveAmmo();
        });

        document.getElementById('maxAmmo').addEventListener('change', buildTable);
        buildTable();

        function calculateLiveAmmo() {
            if (distArray.length === 0 || distArray[0] === 0) {
                document.getElementById('ammoValue').innerText = "--";
                return;
            }
            let bestRound = 0; let smallestDiff = 9999;
            const max = parseInt(document.getElementById('maxAmmo').value) || 30;
            for(let i = 0; i <= max; i++) {
                if (distArray[i] > 0) {
                    let diff = Math.abs(currentDist - distArray[i]);
                    if (diff < smallestDiff) { smallestDiff = diff; bestRound = i; }
                }
            }
            document.getElementById('ammoValue').innerText = bestRound;
            updateHudPreview(bestRound);
        }

        function updateHudPreview(ammoVal = "--") {
            let weapon = document.getElementById('weaponName').value.trim().toUpperCase() || "WPN";
            let magNum = document.getElementById('magNum').value || "0";
            let hudElement = document.getElementById('hudPreviewText');
            
            let hudString = `${weapon} | M:${magNum} | R:${ammoVal}`;
            if (ammoVal !== "--" && parseInt(ammoVal) === 0) hudString = `** ${weapon} | M:${magNum} | EMPTY **`;
            
            hudElement.innerText = hudString;

            if (ammoVal !== "--" && parseInt(ammoVal) <= 5) {
                hudElement.style.color = "#ff3333";
                hudElement.style.opacity = "1.0";
                hudElement.style.boxShadow = "inset 0 0 15px rgba(255, 51, 51, 0.4)";
                hudElement.style.textShadow = "0 0 10px rgba(255, 51, 51, 0.8), 0 0 2px rgba(255, 255, 255, 0.5)";
            } else {
                hudElement.style.color = "#aa1111"; 
                hudElement.style.opacity = "0.7";   
                hudElement.style.boxShadow = "inset 0 0 5px rgba(255, 51, 51, 0.1)";
                hudElement.style.textShadow = "none";
            }
        }

        document.getElementById('weaponName').addEventListener('input', () => updateHudPreview(document.getElementById('ammoValue').innerText));
        document.getElementById('magNum').addEventListener('input', () => updateHudPreview(document.getElementById('ammoValue').innerText));

        document.getElementById('resetTripBtn').addEventListener('click', async () => {
            if (!configChar) return;
            try {
                const encoder = new TextEncoder();
                await configChar.writeValue(encoder.encode("RESET_TRIP"));
                document.getElementById('tripDisplay').innerText = "0";
                alert("Rounds Since Reset has been wiped back to 0.");
            } catch (e) {
                alert("Failed to reset count. Are you still connected?");
            }
        });

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                document.getElementById('status').innerText = "Requesting Bluetooth...";
                myDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Mag' }], optionalServices: [SERVICE_UUID]
                });
                const server = await myDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                distanceChar = await service.getCharacteristic(DISTANCE_CHAR_UUID);
                configChar = await service.getCharacteristic(CONFIG_CHAR_UUID);
                odoChar = await service.getCharacteristic(ODOMETER_CHAR_UUID);

                const odoData = await odoChar.readValue();
                const decoder = new TextDecoder('utf-8');
                const odoString = decoder.decode(odoData);
                const odoParts = odoString.split(",");
                
                document.getElementById('odoDisplay').innerText = odoParts[0] || "0";
                document.getElementById('tripDisplay').innerText = odoParts[1] || "0";

                await distanceChar.startNotifications();
                distanceChar.addEventListener('characteristicvaluechanged', (e) => {
                    currentDist = e.target.value.getUint16(0, true); 
                    document.getElementById('distValue').innerText = currentDist;
                    calculateLiveAmmo();
                });

                document.getElementById('status').innerText = "SYSTEM CONNECTED";
                document.getElementById('status').style.color = "#ff4444";
                document.getElementById('saveBtn').disabled = false;
                document.getElementById('resetTripBtn').disabled = false;
                document.getElementById('connectBtn').innerText = "Connected: " + myDevice.name;
                document.getElementById('connectBtn').style.background = "#cc0000";
            } catch (error) {
                document.getElementById('status').innerText = "CONNECTION FAILED.";
                document.getElementById('status').style.color = "#ff4444";
            }
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const maxAmmo = parseInt(document.getElementById('maxAmmo').value) || 30;
            const magNum = document.getElementById('magNum').value;
            let weaponName = document.getElementById('weaponName').value.trim().substring(0, 8) || "WPN";
            
            let dString = distArray.slice(0, maxAmmo + 1).join(',');
            const configString = `W:${weaponName}|N:${magNum}|M:${maxAmmo}|D:${dString}`;
            const encoder = new TextEncoder();
            
            try {
                document.getElementById('status').innerText = "SAVING MAP TO MEMORY...";
                document.getElementById('status').style.color = "#fff";
                await configChar.writeValue(encoder.encode(configString));
                document.getElementById('status').innerText = "CALIBRATION SAVED PERMANENTLY.";
                document.getElementById('status').style.color = "#ff4444";
            } catch (error) {
                document.getElementById('status').innerText = "SAVE FAILED. CHECK CONNECTION.";
                document.getElementById('status').style.color = "#ff4444";
            }
        });
    </script>
</body>
</html>
